name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "*"

env:
  IMAGE_NAME: cursor-tg-connector

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to publish
        id: publish-check
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Main branch push detected; publishing latest."
            exit 0
          fi

          git fetch --no-tags origin main
          tag_commit="$(git rev-list -n 1 "$GITHUB_SHA")"
          if git merge-base --is-ancestor "$tag_commit" "origin/main"; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} points to commit ${tag_commit} on main."
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main; skipping publish."
          fi

      - name: Set up Docker Buildx
        if: steps.publish-check.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.publish-check.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Extract Docker metadata
        if: steps.publish-check.outputs.publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker image
        if: steps.publish-check.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
